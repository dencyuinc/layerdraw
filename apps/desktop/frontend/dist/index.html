<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LayerDraw</title>
  <style>
    :root { color-scheme: light dark; font: 16px system-ui, sans-serif; background: Canvas; color: CanvasText; }
    :root[data-theme="light"] { color-scheme: light; }
    :root[data-theme="dark"] { color-scheme: dark; }
    body { margin: 0; }
    main { max-width: 72rem; margin: 0 auto; padding: 2rem; }
    nav { display: flex; gap: .75rem; flex-wrap: wrap; }
    button { font: inherit; padding: .65rem 1rem; }
	    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }
	    :root[data-reduced-motion="true"] *, :root[data-reduced-motion="true"] *::before, :root[data-reduced-motion="true"] *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  </style>
</head>
<body>
  <main id="root" aria-labelledby="title">
    <h1 id="title">LayerDraw Desktop</h1>
    <nav aria-label="Project commands">
      <button type="button" data-command="project.new">New project</button>
      <button type="button" data-command="project.open">Open project</button>
      <button type="button" data-command="desktop.settings">Settings</button>
    </nav>
    <p id="status" role="status" aria-live="polite">Ready</p>
  </main>
  <script>
	const shell = () => window.go?.desktopwails?.ShellBinding;
    async function invokeCommand(id) {
      const status = await shell().CommandStatus();
      const current = status.value.find(value => value.id === id);
      if (!current) return;
	      const result = await shell().InvokeCommand({id, source: "control", status_generation: current.generation});
		  if (result?.outcome === "success") window.__layerdrawLastCommand = id;
    }
    document.querySelectorAll("[data-command]").forEach(button => {
	  button.addEventListener("click", () => invokeCommand(button.dataset.command));
	  button.addEventListener("keydown", event => {
	    if (event.key === "Enter" || event.key === " ") {
	      event.preventDefault();
	      invokeCommand(button.dataset.command);
	    }
	  });
	});
    async function accessibilityReport(profile) {
      const controls = [...document.querySelectorAll("button,input,select,textarea,a[href]")];
      const labelsComplete = controls.every(node => node.textContent.trim() || node.getAttribute("aria-label") || node.labels?.length);
		  const focusOrderValid = controls.every((node, index) => {
		    node.focus();
		    const followsPrevious = index === 0 || Boolean(controls[index - 1].compareDocumentPosition(node) & Node.DOCUMENT_POSITION_FOLLOWING);
		    const focusStyle = getComputedStyle(node);
		    return node.tabIndex >= 0 && document.activeElement === node && followsPrevious && focusStyle.outlineStyle !== "none";
		  });
	  const keyboardTarget = controls.find(node => node.dataset.command === "desktop.settings");
	  window.__layerdrawLastCommand = "";
	  keyboardTarget?.dispatchEvent(new KeyboardEvent("keydown", {key: "Enter", bubbles: true}));
	  for (let attempt = 0; attempt < 40 && window.__layerdrawLastCommand !== "desktop.settings"; attempt++) {
	    await new Promise(resolve => setTimeout(resolve, 25));
	  }
	  const keyboardWorkflowValid = !profile.keyboard_only || window.__layerdrawLastCommand === "desktop.settings";
	      document.documentElement.dataset.reducedMotion = String(Boolean(profile.reduced_motion));
	      const motionStyle = getComputedStyle(document.querySelector("main"));
	      const reducedMotionHonored = !profile.reduced_motion || (parseFloat(motionStyle.animationDuration) <= .001 && parseFloat(motionStyle.transitionDuration) <= .001);
      const rgb = value => (value.match(/[\d.]+/g) || []).slice(0, 3).map(Number);
      const luminance = value => rgb(value).map(channel => channel / 255).map(channel => channel <= .03928 ? channel / 12.92 : ((channel + .055) / 1.055) ** 2.4).reduce((sum, channel, index) => sum + channel * [.2126, .7152, .0722][index], 0);
      const style = getComputedStyle(document.documentElement);
      const lighter = Math.max(luminance(style.color), luminance(style.backgroundColor));
      const darker = Math.min(luminance(style.color), luminance(style.backgroundColor));
      return {
        labels_complete: labelsComplete,
        focus_order_valid: focusOrderValid,
        keyboard_workflow_valid: keyboardWorkflowValid,
        reduced_motion_honored: reducedMotionHonored,
        minimum_contrast: (lighter + .05) / (darker + .05),
        zoom_layout_valid: document.documentElement.scrollWidth <= document.documentElement.clientWidth
      };
    }
    window.runtime?.EventsOn("layerdraw:accessibility-probe", async (id, profile) => {
	  const report = await accessibilityReport(profile);
      await shell().SubmitAccessibilityReport(id, report);
    });
  </script>
</body>
</html>
