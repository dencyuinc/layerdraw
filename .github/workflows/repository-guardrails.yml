name: Repository Guardrails

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-guardrails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Validate repository policy
        env:
          LAYERDRAW_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          LAYERDRAW_EVENT_NAME: ${{ github.event_name }}
          LAYERDRAW_PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          LAYERDRAW_PR_BODY: ${{ github.event.pull_request.body }}
        run: ./tools/check-repository.sh
