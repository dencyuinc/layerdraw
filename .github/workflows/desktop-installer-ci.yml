name: Desktop installer verification

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: desktop-installer-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installers:
    name: Test ${{ matrix.platform }} ${{ matrix.format }} installer
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: darwin
            format: dmg
          - runner: windows-2025
            platform: windows
            format: nsis
          - runner: ubuntu-24.04
            platform: linux
            format: deb
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - name: Check out repository without credentials
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up pinned Go toolchain
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Set up pinned Node.js toolchain
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: .node-version

      - name: Enable pinned package manager
        run: corepack enable pnpm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install --yes build-essential dpkg-dev libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config xvfb

      - name: Install pinned Windows installer toolchain
        if: matrix.platform == 'windows'
        shell: pwsh
        run: choco install nsis --version 3.11 --yes --no-progress

      - name: Build N and N+1 unsigned test installers
        shell: bash
        run: |
          go run ./tools/desktopconformance -root . verify
          ./tools/build-desktop-installer.sh "${{ matrix.platform }}" 0.0.1 "$RUNNER_TEMP/desktop-previous"
          ./tools/build-desktop-installer.sh "${{ matrix.platform }}" 0.0.2 "$RUNNER_TEMP/desktop-current"

      - name: Exercise fresh install, launch, upgrade, rollback, and uninstall
        if: matrix.platform != 'windows'
        shell: bash
        env:
          LAYERDRAW_CONFORMANCE_SOURCE_REVISION: ${{ github.sha }}
          LAYERDRAW_DESKTOP_CONFORMANCE_OUTPUT: ${{ runner.temp }}/desktop-current/LayerDraw-0.0.2-${{ matrix.platform }}-scenario.json
        run: |
          suffix="${{ matrix.format }}"
          ./tools/smoke-desktop-installer.sh "${{ matrix.platform }}" \
            "$RUNNER_TEMP/desktop-previous/LayerDraw-0.0.1.$suffix" \
            "$RUNNER_TEMP/desktop-current/LayerDraw-0.0.2.$suffix"

      - name: Exercise Windows install lifecycle
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          LAYERDRAW_CONFORMANCE_SOURCE_REVISION: ${{ github.sha }}
          LAYERDRAW_DESKTOP_CONFORMANCE_OUTPUT: ${{ runner.temp }}\desktop-current\LayerDraw-0.0.2-${{ matrix.platform }}-scenario.json
        run: |
          ./tools/smoke-desktop-installer.ps1 `
            -PreviousInstaller "$env:RUNNER_TEMP\desktop-previous\LayerDraw-0.0.1.exe" `
            -CurrentInstaller "$env:RUNNER_TEMP\desktop-current\LayerDraw-0.0.2.exe"

      - name: Create and verify isolated test attestation and update metadata
        shell: bash
        env:
          CURRENT_VERSION: 0.0.1
        run: |
          suffix="${{ matrix.format }}"
          if [[ "$suffix" == nsis ]]; then suffix=exe; fi
          go run ./tools/desktopattestation create \
            -installer "$RUNNER_TEMP/desktop-current/LayerDraw-0.0.2.$suffix" \
            -closure "$RUNNER_TEMP/desktop-current/LayerDraw-0.0.2-conformance.json" \
            -scenario-result "$RUNNER_TEMP/desktop-current/LayerDraw-0.0.2-${{ matrix.platform }}-scenario.json" \
            -output "$RUNNER_TEMP/desktop-current/LayerDraw-0.0.2-${{ matrix.platform }}-attestation.json" \
            -source-revision "$GITHUB_SHA" -platform "${{ matrix.platform }}" -test-signing
          ./tools/build-desktop-update-metadata.sh test "${{ matrix.platform }}" "${{ matrix.format }}" \
            0.0.2 "$GITHUB_SHA" "$RUNNER_TEMP/desktop-current"
