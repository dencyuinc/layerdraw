name: Design issue
description: Discuss product, language, architecture, boundary, or governance design.
title: "[Design]: "
labels: ["type: design"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What design gap or ambiguity should be resolved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the proposed decision or direction.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches were considered, and why are they insufficient?
    validations:
      required: false
  - type: textarea
    id: affected
    attributes:
      label: Affected contracts
      description: Identify affected requirements, documents, packages, protocols, file formats, delivery surfaces, or license boundaries.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Decision criteria
      description: What evidence or constraints should determine the decision?
    validations:
      required: true
